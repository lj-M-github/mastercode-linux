# Security Hardening Framework Configuration

# Database settings
db:
  path: ./vector_db
  collection_name: cloud_security_benchmarks
  model_name: all-MiniLM-L6-v2

# LLM settings
llm:
  model: deepseek-chat
  temperature: 0.1
  max_tokens: 1000

# Execution settings
executor:
  playbook_dir: ./playbooks
  timeout: 300
  verbose: false

# Self-healing settings
self_heal:
  enabled: true
  max_retries: 3

# Reporting settings
reporting:
  report_dir: ./reports
  report_format: json  # json, markdown, text

# Audit settings
audit:
  log_dir: ./audit_logs
  enabled: true
